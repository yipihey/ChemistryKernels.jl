name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.10', '1']
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v2
      # EmissionKernels resolves from the VespaRegistry (this package is not in General).
      - name: Add registries
        run: julia -e 'using Pkg; Pkg.Registry.add("General"); Pkg.Registry.add(Pkg.RegistrySpec(url="https://github.com/yipihey/VespaRegistry"))'
      # Dedicated test env with a path [sources] back to this package (repo convention).
      - name: Instantiate test env
        run: julia --project=test -e 'using Pkg; Pkg.instantiate()'
      - name: Run tests (table-free suites; grackle-oracle suites are macOS-gated)
        run: julia --project=test test/runtests.jl

  documentation:
    name: Science data and HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - name: Add registries
        run: julia -e 'using Pkg; Pkg.Registry.add("General"); Pkg.Registry.add(Pkg.RegistrySpec(url="https://github.com/yipihey/VespaRegistry"))'
      - name: Instantiate Julia test environment
        run: julia --project=test -e 'using Pkg; Pkg.instantiate()'
      - name: Install site dependencies
        working-directory: docs-site
        run: npm ci
      - name: Regenerate figures from package formulas
        working-directory: docs-site
        run: npm run generate:science
      - name: Require committed figures to be current
        run: git diff --exit-code -- docs-site/app/science-data.ts
      - name: Build and verify rendered HTML
        working-directory: docs-site
        run: npm test
